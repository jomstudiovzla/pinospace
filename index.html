<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pino Espace Verts – Entretien & Aménagement</title>
  <meta name="description" content="Pino Espace Verts – Entretien et aménagement d'espaces verts. Devis gratuit. Contactez-nous sur WhatsApp, email ou Instagram." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── TOKENS ──────────────────────────────────────── */
    :root {
      --cream:       #f2ede3;
      --cream-deep:  #e8e0d0;
      --sage-light:  #b8c9a8;
      --sage:        #8fa07e;
      --olive:       #6b7a5a;
      --olive-dark:  #4e5c40;
      --text:        #2c2c2a;
      --text-light:  #5a5a52;
      --white:       #fdfaf4;
    }

    /* ─── BASE ────────────────────────────────────────── */
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── CANVAS ──────────────────────────────────────── */
    .canvas {
      position: relative;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
      overflow: hidden;
    }

    /* ─── BACKGROUND BLOBS ────────────────────────────── */
    .blob {
      position: absolute;
      pointer-events: none;
      will-change: transform;
    }

    /* Top-right leaf cluster */
    .blob--leaves-tr {
      top: -20px;
      right: -30px;
      width: 260px;
      opacity: 0.55;
    }

    /* Top-left circle arc */
    .blob--circle-tl {
      top: -60px;
      left: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--sage-light) 0%, transparent 70%);
      opacity: 0.4;
    }

    /* Bottom wave */
    .blob--wave-bottom {
      bottom: -2px;
      left: 0;
      width: 100%;
    }

    /* Bottom-left leaf */
    .blob--leaves-bl {
      bottom: 100px;
      left: -20px;
      width: 160px;
      opacity: 0.4;
      transform: scaleX(-1) rotate(-20deg);
    }

    /* ─── CARD ────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(253, 250, 244, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(143, 160, 126, 0.25);
      border-radius: 28px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 8px 32px rgba(78, 92, 64, 0.10),
        0 2px 8px  rgba(78, 92, 64, 0.06);
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── LOGO ────────────────────────────────────────── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .pine-svg {
      width: 90px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(78,92,64,0.22));
    }


    /* ─── HEADER ──────────────────────────────────────── */
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--text);
      line-height: 1.1;
      animation: fadeUp 0.8s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      font-style: italic;
      font-weight: 300;
      color: var(--olive);
      margin-top: 0.35rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
      animation: fadeUp 0.8s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .devis-badge {
      display: inline-block;
      background: var(--olive);
      color: var(--cream);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 1rem;
      border-radius: 100px;
      margin-top: 0.6rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ─── DIVIDER ─────────────────────────────────────── */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--sage), transparent);
      margin: 0 auto 1.75rem;
      border-radius: 2px;
    }

    /* ─── CONTACT BUTTONS ─────────────────────────────── */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      animation: fadeUp 0.8s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.95rem 1.4rem;
      border-radius: 14px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition:
        transform 0.22s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.22s ease,
        background 0.22s ease;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(78,92,64,0.18);
    }

    .btn:active { transform: translateY(-1px); }

    /* WhatsApp */
    .btn--whatsapp {
      background: var(--olive);
      color: var(--white);
      box-shadow: 0 4px 16px rgba(78,92,64,0.20);
    }
    .btn--whatsapp:hover { background: var(--olive-dark); }

    /* Email */
    .btn--email {
      background: var(--sage-light);
      color: var(--olive-dark);
      box-shadow: 0 4px 16px rgba(143,160,126,0.20);
    }
    .btn--email:hover { background: var(--sage); color: var(--white); }

    /* Instagram */
    .btn--instagram {
      background: var(--cream-deep);
      color: var(--olive-dark);
      border: 1px solid rgba(107,122,90,0.20);
      box-shadow: 0 4px 16px rgba(78,92,64,0.08);
    }
    .btn--instagram:hover { background: var(--sage-light); }

    /* Icon circle */
    .btn-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255,255,255,0.18);
    }

    .btn-icon svg { width: 20px; height: 20px; }

    .btn-text { display: flex; flex-direction: column; align-items: flex-start; }
    .btn-label { font-size: 0.75rem; opacity: 0.75; font-weight: 400; }
    .btn-value { font-size: 0.95rem; font-weight: 500; }

    /* ─── FOOTER ──────────────────────────────────────── */
    .footer-name {
      margin-top: 2rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* ─── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 400px) {
      .card { padding: 2.2rem 1.5rem 2rem; border-radius: 20px; }
    }
  </style>
</head>
